<!DOCTYPE html>
<html lang="en">
<head>
    <title>Productivity Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    /* Nav-Bar link to style.css no any functionality okay */   
    <nav class="navbar">
        <h2>📚 Productivity Tracker</h2>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Tasks</a></li>
            <li><a href="#">Timer</a></li>
        </ul>
    </nav>

    <div class="container">

        <h1>Stay Productive 🚀</h1>

        <div class="task-box">
          <input type="text" id="taskInput" placeholder="Enter your task"
  onkeydown="if(event.key === 'Enter') addTask()">
            <button>Add</button>
        </div>

        <ul id="taskList"></ul>


         <h3 id="progress">Progress: 0% (0/0 tasks completed)</h3>

        <div class="timer">
         
<div id="pomo-mode">Focus session</div>
<div id="pomodoro-time">25:00</div>
<button onclick="startPomodoro()">Start</button>
<button onclick="stopPomodoro()">Stop</button>
<button onclick="resetPomodoro()">Reset</button>
<button onclick="switchMode('focus')">Focus (25m)</button>
<button onclick="switchMode('break')">Break (5m)</button>
        </div>
    </div>

</body>

    <script src="script.js"></script>
</body>
</html>
